trigger:
  branches:
    include:
      - main
      - release/*
      - feature/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - tests/**
      - azure-pipelines.yml

schedules:
  - cron: "0 3 * * 1-5"
    displayName: "Daily 10:00 ICT (Mon-Fri)"
    branches:
      include:
        - main
    always: true

resources:
  repositories:
    - repository: templates
      type: github
      name: TantikornDev/template-playwright-automation-pipeline
      endpoint: github-playwright-templates
      ref: refs/tags/v1.0.0

parameters:
  - name: TEST_TYPE
    displayName: "Test Type"
    type: string
    default: "web"
    values:
      - api
      - web
  - name: TEST_ENV
    displayName: "Test Environment"
    type: string
    default: "DEV"
    values:
      - DEV
      - SIT
      - UAT
  - name: TEST_PATH
    displayName: "Test Path (folder or file)"
    type: string
    default: " "
  - name: TEST_TAG
    displayName: "Test Tag (e.g. @smoke, @regression)"
    type: string
    default: " "
  - name: EXTRA_ENV
    displayName: "Extra ENV overrides (e.g. PARALLEL=true)"
    type: string
    default: " "

variables:
  - group: qa-automation-variables

stages:
  - template: stages/dry-run.yml@templates
    parameters:
      TEST_TYPE: ${{ parameters.TEST_TYPE }}

  - template: stages/build-dependencies.yml@templates
    parameters:
      TEST_TYPE: ${{ parameters.TEST_TYPE }}

  - template: stages/run-tests.yml@templates
    parameters:
      TEST_TYPE: ${{ parameters.TEST_TYPE }}
      TEST_ENV: ${{ parameters.TEST_ENV }}
      TEST_PATH: ${{ parameters.TEST_PATH }}
      TEST_TAG: ${{ parameters.TEST_TAG }}
      EXTRA_ENV: ${{ parameters.EXTRA_ENV }}

  - template: stages/notify.yml@templates
    parameters:
      TEST_TYPE: ${{ parameters.TEST_TYPE }}
      WEBHOOK_URL_VAR: "TEAMS_WEBHOOK_URL_WMSH"
